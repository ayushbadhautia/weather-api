<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      color: white;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: black;
      height: 100%;
    }
    .gmain{
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    .main {

      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background-color: rgb(60, 60, 60);
      padding: 15px;
      border-radius: 10px;
      width: 400px;
    }

    .first-section {
      display: flex;
      font-size: 25px;
    }
    .city{
      margin: 0 15px 0 0;
    }

    .second-section div {
      display: flex;
      
    }
    .temperature{
      font-size: 50px;
    }
    .type-description{
      float: right;
    }
    .feelslike{
      float: right;
    }
    .now-temp{
      display: flex;
      flex-direction: column;
      float: left;
    }
  </style>
</head>

<body>
  <div class="gmain">
    <div class="main">
      <div class="first-section section">
        <div class="city">Agra,</div>
        <div class="country">IN</div>
      </div>
      <div class="second-section section">
        <div class="type-description">
          <span class="type">clean</span>
          <span>with</span>
          <span class="description">clear sky</span>
        </div>
        <div class="now-temp">
          <div class="now">Now</div>
          <div class="temperature">33'</div>
        </div>
        
        <div class="feelslike"><span>Feels like 36degree</span></div>

      </div>
      <div class="third-section section">
        <div class="wind">Wind : 14kph</div>
        <div class="humidity">humidity : 31</div>
      </div>
    </div>
  </div>
</body>

</html>
